<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNN Image Recognition</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #111;
    }

    .card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 14px;
      padding: 1.75rem;
      width: 100%;
      max-width: 460px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .icon-box {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: #E6F1FB;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .icon-box i { font-size: 20px; color: #185FA5; }

    .card-header h1 { font-size: 16px; font-weight: 500; color: #111; }
    .card-header p  { font-size: 12px; color: #888; margin-top: 2px; }

    .drop-zone {
      border: 1.5px dashed rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .drop-zone:hover { background: #f5f5f0; }
    .drop-zone input[type=file] { display: none; }

    .drop-icon { font-size: 30px; color: #aaa; }
    .drop-label { font-size: 14px; font-weight: 500; color: #333; margin: 8px 0 4px; }
    .drop-sub   { font-size: 12px; color: #888; }

    #preview {
      display: none;
      max-height: 200px;
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
      border: 0.5px solid rgba(0,0,0,0.1);
    }

    #fileName { font-size: 12px; color: #aaa; text-align: center; margin: 6px 0 0; }

    .predict-btn {
      width: 100%;
      padding: 11px;
      font-size: 15px;
      font-weight: 500;
      background: #185FA5;
      color: #E6F1FB;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 14px;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .predict-btn:hover:not(:disabled) { background: #0C447C; }
    .predict-btn:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; }

    .divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 1.25rem 0; }

    .result-row { display: flex; align-items: center; gap: 16px; }

    #resultImg {
      width: 68px; height: 68px;
      object-fit: cover;
      border-radius: 10px;
      border: 0.5px solid rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    .result-info { flex: 1; min-width: 0; }

    .result-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

    .pred-label { font-size: 16px; font-weight: 500; color: #111; text-transform: capitalize; }

    .badge {
      font-size: 11px; padding: 3px 9px;
      border-radius: 8px; font-weight: 500;
    }
    .badge-blue    { background: #E6F1FB; color: #0C447C; }
    .badge-green   { background: #EAF3DE; color: #27500A; }
    .badge-amber   { background: #FAEEDA; color: #854F0B; }

    .bar-bg   { background: #f0f0eb; border-radius: 4px; height: 8px; overflow: hidden; }
    .bar-fill { height: 8px; border-radius: 4px; background: #185FA5; width: 0%; transition: width 0.6s ease; }

    .conf-text { font-size: 12px; color: #888; margin-top: 5px; }

    .error-box {
      margin-top: 12px;
      padding: 10px 14px;
      border-left: 3px solid #E24B4A;
      background: #fdf5f5;
      border-radius: 0;
    }
    .error-box p { font-size: 13px; color: #A32D2D; }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #e8e8e0; }
      .card { background: #242422; border-color: rgba(255,255,255,0.1); }
      .drop-zone { border-color: rgba(255,255,255,0.2); }
      .drop-zone:hover { background: #2e2e2c; }
      .drop-label { color: #e0e0d8; }
      .bar-bg { background: #333330; }
      .pred-label { color: #e8e8e0; }
      .card-header h1 { color: #e8e8e0; }
      .predict-btn:disabled { background: #333; color: #666; }
      .error-box { background: #2a1a1a; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="icon-box"><i class="ti ti-eye"></i></div>
      <div>
        <h1>CNN image recognition</h1>
        <p>Cat vs dog classifier</p>
      </div>
    </div>

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('imageInput').click()">
      <input type="file" id="imageInput" accept="image/*">
      <div id="dropContent">
        <i class="ti ti-upload drop-icon"></i>
        <p class="drop-label">Click or drag an image here</p>
        <p class="drop-sub">PNG, JPG, WEBP supported</p>
      </div>
      <img id="preview" alt="Preview image">
    </div>
    <p id="fileName"></p>

    <button class="predict-btn" id="predictBtn" disabled onclick="runPredict()">
      <i class="ti ti-brain"></i> Predict
    </button>

    <div id="resultArea" style="display:none;">
      <hr class="divider">
      <div class="result-row">
        <img id="resultImg" src="" alt="Uploaded image">
        <div class="result-info">
          <div class="result-top">
            <span class="pred-label" id="predLabel">—</span>
            <span class="badge badge-blue" id="predTag">—</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" id="confBar"></div></div>
          <p class="conf-text" id="confText"></p>
        </div>
      </div>
    </div>

    <div class="error-box" id="errorArea" style="display:none;">
      <p id="errorText"></p>
    </div>
  </div>

  <script>
    const imgInput  = document.getElementById('imageInput');
    const preview   = document.getElementById('preview');
    const dropContent = document.getElementById('dropContent');
    const predictBtn  = document.getElementById('predictBtn');

    imgInput.addEventListener('change', () => {
      const file = imgInput.files[0];
      if (!file) return;
      document.getElementById('fileName').textContent = file.name;
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      dropContent.style.display = 'none';
      predictBtn.disabled = false;
      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('errorArea').style.display = 'none';
    });

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = '#f0f0eb'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.background = '');
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.style.background = '';
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        const dt = new DataTransfer();
        dt.items.add(file);
        imgInput.files = dt.files;
        imgInput.dispatchEvent(new Event('change'));
      }
    });

    async function runPredict() {
      const file = imgInput.files[0];
      if (!file) return;
      predictBtn.disabled = true;
      predictBtn.innerHTML = '<i class="ti ti-loader-2"></i> Predicting...';
      document.getElementById('errorArea').style.display = 'none';

      try {
        const fd = new FormData();
        fd.append('image', file);
        const resp = await fetch('/predict', { method: 'POST', body: fd });
        const data = await resp.json();

        if (resp.ok) {
          document.getElementById('resultImg').src = preview.src;
          document.getElementById('predLabel').textContent = data.class;

          const pct = (data.probability * 100).toFixed(1);
          document.getElementById('confBar').style.width = pct + '%';
          document.getElementById('confText').textContent = 'Confidence: ' + pct + '%';

          const tag = document.getElementById('predTag');
          if (pct >= 80) {
            tag.textContent = 'High confidence';
            tag.className = 'badge badge-green';
          } else if (pct >= 50) {
            tag.textContent = 'Medium confidence';
            tag.className = 'badge badge-amber';
          } else {
            tag.textContent = 'Low confidence';
            tag.className = 'badge badge-blue';
          }

          document.getElementById('resultArea').style.display = 'block';
        } else {
          showError(data.error || 'Prediction failed.');
        }
      } catch (e) {
        showError('Could not reach the server. Make sure your Flask backend is running.');
      }

      predictBtn.disabled = false;
      predictBtn.innerHTML = '<i class="ti ti-brain"></i> Predict';
    }

    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorArea').style.display = 'block';
    }
  </script>
</body>
</html>
